name: AggregatorApp

options:
  bundleIdPrefix: net.renalias
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  AggregatorApp:
    type: application
    platform: iOS
    sources:
      - path: AggregatorApp
    dependencies:
      - target: AggregatorWidget
    entitlements:
      path: AggregatorApp/AggregatorApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.renalias.AggregatorApp
        keychain-access-groups:
          - $(AppIdentifierPrefix)net.renalias.AggregatorApp.shared
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QEZ63CXN26
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        PRODUCT_BUNDLE_IDENTIFIER: net.renalias.AggregatorApp
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - AggregatorAppTests

  AggregatorWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: AggregatorWidget
      - path: AggregatorApp/Common/APIClient.swift
      - path: AggregatorApp/Common/KeychainHelper.swift
      - path: AggregatorApp/Common/CredentialsStore.swift
      - path: AggregatorApp/Common/DateDisplay.swift
      - path: AggregatorApp/Common/Error+Cancellation.swift
      - path: AggregatorApp/Models
      - path: AggregatorApp/Articles/ArticleFeed.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    entitlements:
      path: AggregatorWidget/AggregatorWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.renalias.AggregatorApp
        keychain-access-groups:
          - $(AppIdentifierPrefix)net.renalias.AggregatorApp.shared
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QEZ63CXN26
        INFOPLIST_FILE: AggregatorWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: net.renalias.AggregatorApp.AggregatorWidget
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"

  AggregatorAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AggregatorAppTests
    dependencies:
      - target: AggregatorApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: net.renalias.AggregatorAppTests
